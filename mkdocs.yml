site_name: github-runner
site_description: Self-hosted GitHub Actions runner built in Go
site_url: https://org.github.io/github-runner

repo_name: org/github-runner
repo_url: https://github.com/org/github-runner

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - tables
  - admonitions
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Executors: executors.md
  - Security: security.md
  - Observability: observability.md
  - Development: development.md
